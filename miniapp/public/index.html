<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>timur.bot admin</title>
  <script src="https://telegram.org/js/telegram-web-app.js?62"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Unbounded:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: var(--tg-theme-bg-color, #0a0b11);
      --card: color-mix(in srgb, var(--tg-theme-secondary-bg-color, #1b1d28) 84%, transparent);
      --text: var(--tg-theme-text-color, #ecf6ff);
      --hint: var(--tg-theme-hint-color, #8f95a8);
      --line: rgba(255, 255, 255, 0.14);
      --cyan: #2ee6ff;
      --violet: #7445ff;
      --gradient: linear-gradient(135deg, #2ee6ff 0%, #7445ff 100%);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: var(--bg); color: var(--text); }
    body {
      font-family: "Unbounded", system-ui, sans-serif;
      background:
        radial-gradient(900px 420px at -10% 8%, rgba(46, 230, 255, 0.18), transparent 58%),
        radial-gradient(1000px 500px at 110% 18%, rgba(116, 69, 255, 0.2), transparent 60%),
        var(--bg);
      padding-bottom: calc(84px + var(--tg-content-safe-area-inset-bottom, 0px));
    }

    nav {
      position: sticky;
      top: 0;
      z-index: 30;
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: calc(14px + var(--tg-safe-area-inset-top, 0px)) 16px 14px;
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(14px);
      background: color-mix(in srgb, var(--bg) 90%, transparent);
    }
    nav::-webkit-scrollbar { display: none; }
    .tab-btn {
      border: 1px solid var(--line);
      border-radius: 14px;
      color: var(--hint);
      background: color-mix(in srgb, var(--card) 88%, transparent);
      padding: 10px 16px;
      font-weight: 700;
      font-size: 11px;
      white-space: nowrap;
      cursor: pointer;
    }
    .tab-btn.active { background: #fff; color: #0f1320; border-color: #fff; }

    .container { max-width: 760px; margin: 0 auto; padding: 14px 12px; }
    .section { display: none; animation: rise .28s ease; }
    .section.active { display: block; }
    @keyframes rise { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

    .logo {
      font-family: "Syne", sans-serif;
      font-size: clamp(34px, 10vw, 62px);
      line-height: 0.84;
      letter-spacing: -2px;
      margin: 0 0 16px;
    }
    .grad {
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 22px;
      background: var(--card);
      backdrop-filter: blur(20px);
      padding: 14px;
      margin-bottom: 12px;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.26);
    }
    .label {
      font-size: 11px;
      color: var(--hint);
      font-weight: 900;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 10px;
      display: block;
    }

    .persona-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .chip {
      border: 1px solid var(--line);
      border-radius: 15px;
      padding: 14px;
      background: color-mix(in srgb, var(--card) 88%, transparent);
      text-align: center;
      color: var(--text);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }
    .chip.active { color: var(--cyan); border-color: rgba(46, 230, 255, 0.7); }

    .small { color: var(--hint); font-size: 12px; line-height: 1.5; }
    .preview {
      margin-top: 12px;
      border-left: 3px solid var(--cyan);
      border-radius: 12px;
      padding: 10px 12px;
      background: color-mix(in srgb, var(--card) 88%, transparent);
      font-size: 13px;
    }

    .member-tabs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
    .member-btn {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: color-mix(in srgb, var(--card) 88%, transparent);
      color: var(--text);
      font-size: 11px;
      font-weight: 700;
      padding: 8px 14px;
      cursor: pointer;
    }
    .member-btn.active { border-color: rgba(46, 230, 255, 0.82); color: var(--cyan); }

    .bubble-wrap {
      border: 1px solid var(--line);
      border-radius: 16px;
      min-height: clamp(260px, 44vh, 360px);
      background:
        radial-gradient(460px 240px at 50% 50%, rgba(46, 230, 255, 0.1), transparent 65%),
        radial-gradient(500px 260px at 54% 52%, rgba(116, 69, 255, 0.14), transparent 68%),
        rgba(0,0,0,0.1);
      overflow: hidden;
      position: relative;
    }
    #cloudCanvas { width: 100%; height: clamp(260px, 44vh, 360px); display: block; }

    .row { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
    .mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 10px 0; }
    .mode-btn {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: color-mix(in srgb, var(--card) 88%, transparent);
      color: var(--text);
      font-size: 11px;
      font-weight: 700;
      padding: 11px 10px;
      text-align: center;
      cursor: pointer;
    }
    .mode-btn.active { background: #fff; color: #0f1320; border-color: #fff; }

    .price {
      font-family: "Syne", sans-serif;
      font-size: 38px;
      line-height: 1;
      margin: 8px 0;
    }

    .table { margin-top: 10px; border: 1px solid var(--line); border-radius: 14px; overflow: hidden; }
    .tr {
      display: grid;
      grid-template-columns: 1.2fr 0.7fr 0.6fr;
      gap: 8px;
      padding: 10px;
      font-size: 10px;
      border-bottom: 1px solid var(--line);
      background: color-mix(in srgb, var(--card) 92%, transparent);
    }
    .tr:last-child { border-bottom: none; }
    .tr.head { color: var(--hint); text-transform: uppercase; font-size: 10px; }

    .buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }
    .btn {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      font-family: inherit;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      color: var(--text);
      background: color-mix(in srgb, var(--card) 88%, transparent);
    }
    .btn.primary { background: #fff; color: #0f1320; border-color: #fff; }

    .bottom {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 10px 12px;
      padding-bottom: calc(10px + var(--tg-content-safe-area-inset-bottom, 0px));
      background: linear-gradient(to top, color-mix(in srgb, var(--bg) 96%, transparent), transparent);
    }
    .save {
      width: 100%;
      border: none;
      border-radius: 16px;
      padding: 14px;
      font-family: "Syne", sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      font-size: 13px;
      color: #fff;
      background: var(--gradient);
      cursor: pointer;
    }

    .bubble {
      filter: drop-shadow(0 0 14px rgba(116,69,255,.35));
      transition: transform .12s ease;
    }
    .bubble:hover { transform: scale(1.04); }

    @media (max-width: 560px) {
      .persona-grid { grid-template-columns: 1fr; }
      .mode-grid { grid-template-columns: 1fr; }
      .buttons { grid-template-columns: 1fr; }
      .logo { margin-bottom: 12px; letter-spacing: -1px; }
      .tab-btn { padding: 9px 13px; font-size: 10px; }
      .member-btn { font-size: 10px; padding: 7px 12px; }
      .small { font-size: 11px; }
      .price { font-size: 34px; }
      .tr { padding: 9px 8px; }
    }

    @media (min-width: 900px) {
      .container { max-width: 1020px; padding: 20px 16px; }
      .card { border-radius: 26px; padding: 18px; }
      .bubble-wrap { min-height: 420px; border-radius: 20px; }
      #cloudCanvas { height: 420px; }
    }
  </style>
</head>
<body>
  <nav>
    <button type="button" class="tab-btn active" data-tab="settings">Настройки</button>
    <button type="button" class="tab-btn" data-tab="memory">Память</button>
    <button type="button" class="tab-btn" data-tab="billing">Оплата</button>
  </nav>

  <main class="container">
    <section id="settings" class="section active">
      <h1 class="logo">timur.<span class="grad">bot</span></h1>
      <div class="card">
        <span class="label">Режим личности</span>
        <div id="personaGrid" class="persona-grid"></div>
        <div class="row" style="margin-top:12px">
          <span class="small">Уровень вредности</span>
          <b id="heatValue">82/100</b>
        </div>
        <input id="heatRange" type="range" min="0" max="100" value="82" style="width:100%; margin-top:8px; accent-color:#2ee6ff;">
        <div id="previewText" class="preview"></div>
      </div>
    </section>

    <section id="memory" class="section">
      <h1 class="logo">data.<span class="grad">cloud</span></h1>
      <div class="card">
        <span class="label">Персонажи беседы</span>
        <div id="memberTabs" class="member-tabs"></div>
        <div class="bubble-wrap">
          <canvas id="cloudCanvas"></canvas>
        </div>
        <div class="small" id="archText" style="margin-top:10px"></div>
        <div class="small" id="linksText"></div>
      </div>
    </section>

    <section id="billing" class="section">
      <h1 class="logo">pay.<span class="grad">hub</span></h1>
      <div class="card">
        <span class="label">Схема оплаты</span>
        <div class="mode-grid">
          <button class="mode-btn active" data-mode="owner">Админ платит за всех</button>
          <button class="mode-btn" data-mode="split">Split на участников</button>
        </div>
        <div class="row"><span class="small">Активных за 30 дней</span><b id="activeUsers">13</b></div>
        <div class="row"><span class="small">Платящих</span><b id="payerCount">10</b></div>
        <div class="row"><span class="small">Цена за активного</span><b id="pricePer">45₽</b></div>
        <div class="row"><span class="small">Итог (RUB)</span><b id="sumRub">585₽</b></div>
        <div id="sumStars" class="price">699 Stars</div>
        <div class="small">Для цифровых функций в Telegram используются Stars, сумма целая.</div>
        <div class="table">
          <div class="tr head"><div>Участник</div><div>Статус</div><div>Доля</div></div>
          <div id="payerRows"></div>
        </div>
        <div class="buttons">
          <button class="btn">Сформировать инвойсы</button>
          <button class="btn primary">Оплатить</button>
        </div>
      </div>
    </section>
  </main>

  <div class="bottom">
    <button id="saveBtn" class="save">Сохранить конфиг</button>
  </div>

  <script>
    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.ready();
      tg.expand();
    }

    const state = {
      currentTab: "settings",
      persona: "toxic",
      heat: 82,
      billingMode: "owner",
      activeUsers30d: 13,
      payerCount: 10,
      pricePerRub: 45,
      minRub: 199,
      maxRub: 3490,
      starsPerRub: 1.2,
      selectedMember: "masha",
      previews: {
        toxic: "опять ты? это было так криво что даже баг засмущался",
        genius: "решение простое если не ломать архитектуру ради одной фичи",
        slang: "бро ща раскидаю по фактам и будет красота",
        silent: "..."
      },
      personas: [
        ["toxic", "TOXIC AI"],
        ["genius", "GENIUS"],
        ["slang", "SLANG"],
        ["silent", "SILENT"]
      ],
      members: [
        { id: "alex", title: "@alex_crypto", tags: ["Стейкинг", "NFT", "Python", "Темки", "Лудоман"], archetypes: ["драматик", "айтишник"], links: ["@masha_dev", "@timur"] },
        { id: "masha", title: "@masha_dev", tags: ["Frontend", "UX/UI", "Swift", "Awwwards", "Дедлайны"], archetypes: ["айтишник", "мемолог"], links: ["@alex_crypto", "@timur"] },
        { id: "timur", title: "@timur", tags: ["Сленг", "Прожарка", "Казань", "Зал", "Ирония", "Мемы"], archetypes: ["мемолог", "спортсмен"], links: ["@alex_crypto", "@masha_dev"] }
      ]
    };

    let cloudEngine = null;

    function haptic(type = "selection") {
      if (!tg?.HapticFeedback) return;
      try {
        if (type === "selection") tg.HapticFeedback.selectionChanged();
        if (type === "soft") tg.HapticFeedback.impactOccurred("soft");
        if (type === "success") tg.HapticFeedback.notificationOccurred("success");
      } catch (_) {}
    }

    function renderTabs() {
      const tabButtons = document.querySelectorAll(".tab-btn");
      const sections = document.querySelectorAll(".section");
      tabButtons.forEach(btn => {
        btn.onclick = () => {
          state.currentTab = btn.dataset.tab;
          tabButtons.forEach(x => x.classList.toggle("active", x === btn));
          sections.forEach(s => s.classList.toggle("active", s.id === state.currentTab));
          haptic("selection");
        };
      });
    }

    function renderSettings() {
      const wrap = document.getElementById("personaGrid");
      wrap.innerHTML = "";
      state.personas.forEach(([id, title]) => {
        const b = document.createElement("button");
        b.type = "button";
        b.className = "chip" + (state.persona === id ? " active" : "");
        b.textContent = title;
        b.onclick = () => {
          state.persona = id;
          renderSettings();
          haptic("soft");
        };
        wrap.appendChild(b);
      });
      const range = document.getElementById("heatRange");
      range.value = String(state.heat);
      range.oninput = e => {
        state.heat = Number(e.target.value);
        document.getElementById("heatValue").textContent = state.heat + "/100";
      };
      document.getElementById("heatValue").textContent = state.heat + "/100";
      document.getElementById("previewText").textContent = state.previews[state.persona] || "...";
    }

    function renderMembers() {
      const tabs = document.getElementById("memberTabs");
      tabs.innerHTML = "";
      state.members.forEach(m => {
        const b = document.createElement("button");
        b.type = "button";
        b.className = "member-btn" + (state.selectedMember === m.id ? " active" : "");
        b.textContent = m.title;
        b.onclick = () => {
          state.selectedMember = m.id;
          renderMembers();
          haptic("selection");
        };
        tabs.appendChild(b);
      });

      const m = state.members.find(x => x.id === state.selectedMember) || state.members[0];
      document.getElementById("archText").textContent = "Архетипы: " + m.archetypes.join(", ");
      document.getElementById("linksText").textContent = "Связи: " + m.links.join(", ");
      renderBubbleCloud(m.tags);
    }

    function stopBubbleCloud() {
      if (cloudEngine?.raf) cancelAnimationFrame(cloudEngine.raf);
      cloudEngine = null;
    }

    function renderBubbleCloud(tags) {
      stopBubbleCloud();

      const canvas = document.getElementById("cloudCanvas");
      const wrap = canvas.parentElement;
      const dpr = Math.max(1, window.devicePixelRatio || 1);
      const w = wrap.clientWidth || 900;
      const h = wrap.clientHeight || 420;
      canvas.width = Math.floor(w * dpr);
      canvas.height = Math.floor(h * dpr);

      const ctx = canvas.getContext("2d");
      if (!ctx) return;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.font = "800 20px Unbounded, sans-serif";

      const cx = w * 0.52;
      const cy = h * 0.52;
      const nodes = tags.map((label, i) => {
        const base = 30 + label.length * 3.2;
        const r = Math.max(30, Math.min(92, base));
        const angle = (Math.PI * 2 * i) / Math.max(1, tags.length);
        const ring = Math.min(w, h) * 0.16 + (i % 3) * 30 + Math.random() * 18;
        return {
          label,
          r,
          x: cx + Math.cos(angle) * ring,
          y: cy + Math.sin(angle) * ring,
          vx: (Math.random() - 0.5) * 0.22,
          vy: (Math.random() - 0.5) * 0.22,
          phase: Math.random() * Math.PI * 2,
          wobble: 0.022 + Math.random() * 0.018,
          wobblePhase: Math.random() * Math.PI * 2
        };
      });

      function keepInside(n) {
        const pad = 8;
        if (n.x < n.r + pad) { n.x = n.r + pad; n.vx *= -0.72; }
        if (n.x > w - n.r - pad) { n.x = w - n.r - pad; n.vx *= -0.72; }
        if (n.y < n.r + pad) { n.y = n.r + pad; n.vy *= -0.72; }
        if (n.y > h - n.r - pad) { n.y = h - n.r - pad; n.vy *= -0.72; }
      }

      function collide() {
        for (let i = 0; i < nodes.length; i += 1) {
          for (let j = i + 1; j < nodes.length; j += 1) {
            const a = nodes[i];
            const b = nodes[j];
            const dx = b.x - a.x;
            const dy = b.y - a.y;
            const dist = Math.hypot(dx, dy) || 0.0001;
            const minDist = a.r + b.r + 6;
            if (dist >= minDist) continue;
            const overlap = (minDist - dist) * 0.52;
            const nx = dx / dist;
            const ny = dy / dist;
            a.x -= nx * overlap;
            a.y -= ny * overlap;
            b.x += nx * overlap;
            b.y += ny * overlap;
            a.vx -= nx * 0.03;
            a.vy -= ny * 0.03;
            b.vx += nx * 0.03;
            b.vy += ny * 0.03;
          }
        }
      }

      function drawDropletPath(ctx2d, rr, t, wobble, wobblePhase) {
        const points = 44;
        const pts = [];
        for (let i = 0; i < points; i += 1) {
          const a = (Math.PI * 2 * i) / points;
          const noise =
            1 +
            Math.sin(a * 2.1 + t * 0.42 + wobblePhase) * wobble +
            Math.cos(a * 3.4 - t * 0.37 + wobblePhase * 0.9) * (wobble * 0.72);
          const r = rr * Math.max(0.9, Math.min(1.08, noise));
          pts.push({ x: Math.cos(a) * r, y: Math.sin(a) * r });
        }
        ctx2d.beginPath();
        for (let i = 0; i < points; i += 1) {
          const p0 = pts[i];
          const p1 = pts[(i + 1) % points];
          const mx = (p0.x + p1.x) * 0.5;
          const my = (p0.y + p1.y) * 0.5;
          if (i === 0) ctx2d.moveTo(mx, my);
          ctx2d.quadraticCurveTo(p1.x, p1.y, mx, my);
        }
        ctx2d.closePath();
      }

      function drawBubble(n, t) {
        const pulse = 1 + Math.sin(t * 0.45 + n.phase) * 0.014;
        const rr = n.r * pulse;

        ctx.save();
        ctx.translate(n.x, n.y);

        const g = ctx.createRadialGradient(-rr * 0.36, -rr * 0.42, rr * 0.14, 0, 0, rr * 1.12);
        g.addColorStop(0, "rgba(236,253,255,0.34)");
        g.addColorStop(0.48, "rgba(128,232,255,0.2)");
        g.addColorStop(1, "rgba(44,174,214,0.12)");
        ctx.strokeStyle = "rgba(129,236,255,0.44)";
        ctx.shadowColor = "rgba(76,215,255,0.3)";

        ctx.fillStyle = g;
        ctx.lineWidth = 1.2;
        ctx.shadowBlur = 18;
        drawDropletPath(ctx, rr, t, n.wobble, n.wobblePhase);
        ctx.fill();
        ctx.stroke();

        const gloss = ctx.createRadialGradient(-rr * 0.42, -rr * 0.52, rr * 0.02, -rr * 0.3, -rr * 0.32, rr * 0.6);
        gloss.addColorStop(0, "rgba(255,255,255,0.32)");
        gloss.addColorStop(1, "rgba(255,255,255,0)");
        ctx.fillStyle = gloss;
        ctx.beginPath();
        ctx.ellipse(-rr * 0.16, -rr * 0.2, rr * 0.52, rr * 0.42, -0.35, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = "rgba(215,252,255,0.34)";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.ellipse(-rr * 0.2, -rr * 0.22, rr * 0.38, rr * 0.28, -0.4, 3.8, 5.95);
        ctx.stroke();

        ctx.shadowBlur = 0;
        ctx.fillStyle = "rgba(233,251,255,0.95)";
        ctx.strokeStyle = "rgba(5,9,18,0.18)";
        ctx.lineWidth = 2.2;
        const textSize = Math.max(12, Math.min(22, rr * 0.33));
        ctx.font = `800 ${textSize}px Unbounded, sans-serif`;
        ctx.strokeText(n.label, 0, 0);
        ctx.fillText(n.label, 0, 0);

        ctx.restore();
      }

      function frame(now) {
        const t = now * 0.0007;
        ctx.clearRect(0, 0, w, h);

        for (let i = 0; i < nodes.length; i += 1) {
          const n = nodes[i];
          n.vx += Math.cos(t + i * 0.7 + n.phase) * 0.009;
          n.vy += Math.sin(t * 1.08 + i * 0.6 + n.phase) * 0.009;
          n.vx += (cx - n.x) * 0.00035;
          n.vy += (cy - n.y) * 0.00035;
          n.vx *= 0.993;
          n.vy *= 0.993;
          n.x += n.vx;
          n.y += n.vy;
          keepInside(n);
        }
        collide();

        nodes.forEach(n => drawBubble(n, t));
        cloudEngine.raf = requestAnimationFrame(frame);
      }

      cloudEngine = { raf: 0 };
      cloudEngine.raf = requestAnimationFrame(frame);
    }

    function totalRub() {
      const raw = state.activeUsers30d * state.pricePerRub;
      return Math.max(state.minRub, Math.min(state.maxRub, raw));
    }

    function totalStars() {
      return Math.max(1, Math.round(totalRub() * state.starsPerRub));
    }

    function renderBilling() {
      document.querySelectorAll(".mode-btn").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.mode === state.billingMode);
        btn.onclick = () => {
          state.billingMode = btn.dataset.mode;
          state.payerCount = state.billingMode === "owner" ? 1 : Math.min(10, state.activeUsers30d);
          renderBilling();
          haptic("selection");
        };
      });

      const rub = totalRub();
      const stars = totalStars();
      document.getElementById("activeUsers").textContent = state.activeUsers30d;
      document.getElementById("payerCount").textContent = state.payerCount;
      document.getElementById("pricePer").textContent = state.pricePerRub + "₽";
      document.getElementById("sumRub").textContent = rub + "₽";
      document.getElementById("sumStars").textContent = stars + " Stars";

      const rows = document.getElementById("payerRows");
      rows.innerHTML = "";
      const pick = state.members.slice(0, state.payerCount);
      const share = Math.ceil(stars / Math.max(1, state.payerCount));
      pick.forEach(m => {
        const tr = document.createElement("div");
        tr.className = "tr";
        tr.innerHTML = `<div>${m.title}</div><div>pending</div><div>${share}</div>`;
        rows.appendChild(tr);
      });
    }

    function serializeConfig() {
      return {
        persona: state.persona,
        heat: state.heat,
        selectedMember: state.selectedMember,
        billing: {
          mode: state.billingMode,
          activeUsers30d: state.activeUsers30d,
          payerCount: state.payerCount,
          totalRub: totalRub(),
          totalStars: totalStars(),
          currency: "XTR"
        },
        ts: new Date().toISOString()
      };
    }

    function bindSave() {
      const saveBtn = document.getElementById("saveBtn");
      saveBtn.onclick = () => {
        const payload = JSON.stringify({ type: "admin_config", payload: serializeConfig() });
        if (tg?.sendData) tg.sendData(payload);
        else console.log(payload);
        haptic("success");
      };
    }

    function bootstrap() {
      renderTabs();
      renderSettings();
      renderMembers();
      renderBilling();
      bindSave();
      window.addEventListener("resize", () => renderMembers());
    }

    bootstrap();
  </script>
</body>
</html>
